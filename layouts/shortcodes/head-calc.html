<div id="head-calc-container" style="background: #ffffff; padding: 25px; border-radius: 12px; border: 1px solid #dee2e6; margin: 25px 0; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h3 style="margin-top:0; border-bottom: 2px solid #3498db; padding-bottom: 12px; color: #2980b9;">🛢️ Vessel Head Volume Calculator</h3>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; align-items: start;">
        
        <div style="background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
            <h4 style="margin-top: 0; color: #2c3e50; font-size: 1em;">Geometry Inputs</h4>

            <label style="font-weight:bold; font-size: 0.85em; color: #444;">Inside Diameter D (mm)</label>
            <input type="number" id="vessel_D" value="1000" placeholder="e.g. 1000" step="any" oninput="calculateHead()" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em;">

            <label style="font-weight:bold; font-size: 0.85em; color: #444;">Head Type</label>
            <select id="head_type" onchange="calculateHead()" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-size: 1em;">
                <option value="hemi">Hemispherical</option>
                <option value="ellip21" selected>2:1 Ellipsoidal (Minor axis = D/4)</option>
                <option value="dished10">10% Dished (80-10 Torispherical)</option>
                <option value="asme">Standard ASME F&D (100-6 Torispherical)</option>
            </select>
            
            <div id="error_msg" style="display:none; color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 6px; margin-top: 15px; font-size: 0.85em; font-weight: bold; border: 1px solid #ffcdd2;">
                ⚠️ Please enter a valid Diameter greater than 0.
            </div>
        </div>

        <div style="background: #e1f5fe; border: 2px solid #2980b9; border-radius: 8px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center;">
            <span style="font-size: 0.9em; color: #2c3e50; font-weight: bold; margin-bottom: 5px;">Internal Volume</span>
            <span id="res_vol_L" style="font-size: 2em; color: #2980b9; font-weight: bold; font-family: monospace;">-</span>
            <span id="res_vol_m3" style="font-size: 1.1em; color: #555; margin-top: 5px;">-</span>
        </div>
    </div>

    <div id="svg_container" style="text-align: center; border: 1px dashed #ccc; border-radius: 8px; padding: 10px; background: #fafafa;">
        <h4 style="margin: 0 0 10px 0; color: #555; font-size: 0.9em;">Shape Profile</h4>
        <svg id="head_svg" viewBox="0 0 400 220" width="100%" style="max-width: 400px; height: auto;">
            <defs>
                <marker id="arrowHeadStart" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M9,0 L0,3 L9,6 z" fill="#555" />
                </marker>
                <marker id="arrowHeadEnd" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L9,3 L0,6 z" fill="#555" />
                </marker>
            </defs>
            
            <path id="head_path" fill="#e1f5fe" stroke="#2980b9" stroke-width="3" d=""></path>
            
            <line x1="50" y1="180" x2="350" y2="180" stroke="#555" stroke-width="1.5" marker-start="url(#arrowHeadStart)" marker-end="url(#arrowHeadEnd)" />
            <line x1="50" y1="150" x2="50" y2="190" stroke="#ccc" stroke-dasharray="4" />
            <line x1="350" y1="150" x2="350" y2="190" stroke="#ccc" stroke-dasharray="4" />
            
            <rect x="120" y="170" width="160" height="20" fill="#fafafa"></rect>
            <text id="dim_text" x="200" y="185" fill="#333" font-size="14" font-weight="bold" text-anchor="middle">Diameter: 1000 mm</text>
        </svg>
    </div>
</div>

<script>
(function () {
    window.calculateHead = function() {
        const D_input = document.getElementById('vessel_D').value;
        const D_mm = parseFloat(D_input);
        const headType = document.getElementById('head_type').value;
        
        const errorMsg = document.getElementById('error_msg');
        const volL = document.getElementById('res_vol_L');
        const volM3 = document.getElementById('res_vol_m3');
        const svgContainer = document.getElementById('svg_container');

        // Validation & Error Handling
        if (!D_input || !Number.isFinite(D_mm) || D_mm <= 0) {
            errorMsg.style.display = 'block';
            volL.innerText = "- Liters";
            volM3.innerText = "- m³";
            svgContainer.style.opacity = "0.3";
            return;
        }

        // Clear errors
        errorMsg.style.display = 'none';
        svgContainer.style.opacity = "1";

        // Volume Calculation Logic
        const D_m = D_mm / 1000;
        const D_m3 = Math.pow(D_m, 3);
        let V_m3 = 0;

        switch(headType) {
            case 'hemi':
                V_m3 = (Math.PI * D_m3) / 12;
                break;
            case 'ellip21':
                V_m3 = (Math.PI * D_m3) / 24;
                break;
            case 'asme':
                V_m3 = 0.0847 * D_m3;
                break;
            case 'dished10':
                V_m3 = 0.096 * D_m3;
                break;
        }

        const V_L = V_m3 * 1000;

        // Dynamic Formatting based on size
        const fracL = V_L > 1000 ? 0 : (V_L < 10 ? 2 : 1);
        const fracM3 = V_m3 < 0.1 ? 4 : 2;

        document.getElementById('res_vol_L').innerText = V_L.toLocaleString(undefined, {minimumFractionDigits: fracL, maximumFractionDigits: fracL}) + " L";
        document.getElementById('res_vol_m3').innerText = V_m3.toLocaleString(undefined, {minimumFractionDigits: fracM3, maximumFractionDigits: fracM3}) + " m³";
        
        // Update SVG Dimension Text per exact requirement
        document.getElementById('dim_text').innerText = "Diameter: " + D_input + " mm";

        // Draw geometrically accurate SVG
        drawSVG(headType);
    }

    function drawSVG(type) {
        const pathEl = document.getElementById('head_path');
        // SVG Canvas Width for Vessel is 300 (x: 50 to 350). Base line is at y = 150.
        
        let pathD = "";
        
        if (type === 'hemi') {
            // Hemisphere: Depth = R = 150
            pathD = "M 50,150 A 150 150 0 0 1 350 150";
        
        } else if (type === 'ellip21') {
            // Requirement strict interpretation: Minor axis = D/4.
            // Therefore, Semi-minor axis (Depth) = D/8. Width = 300, Depth = 300/8 = 37.5.
            pathD = "M 50,150 A 150 37.5 0 0 1 350 150";
        
        } else if (type === 'asme') {
            // ASME F&D (100% Crown, 6% Knuckle)
            // Calculated Tangent points between Rc=300 and Rk=18
            // T1(x=59.58, y=134.10), T2(x=340.42, y=134.10)
            pathD = "M 50,150 " + 
                    "A 18 18 0 0 1 59.58 134.1 " +     // Left Knuckle
                    "A 300 300 0 0 1 340.42 134.1 " +  // Crown
                    "A 18 18 0 0 1 350 150";           // Right Knuckle
        
        } else if (type === 'dished10') {
            // 10% Dished (80% Crown, 10% Knuckle)
            // Calculated Tangent points between Rc=240 and Rk=30
            // T1(x=62.86, y=125.38), T2(x=337.14, y=125.38)
            pathD = "M 50,150 " + 
                    "A 30 30 0 0 1 62.86 125.38 " +    // Left Knuckle
                    "A 240 240 0 0 1 337.14 125.38 " + // Crown
                    "A 30 30 0 0 1 350 150";           // Right Knuckle
        }
        
        // Close the path with a straight flange representation
        pathD += " L 350,165 L 50,165 Z";
        pathEl.setAttribute("d", pathD);
    }

    // Initialize on load
    calculateHead();
})();
</script>
