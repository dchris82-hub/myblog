<div id="steam-calc-container" style="background: #ffffff; padding: 25px; border-radius: 12px; border: 1px solid #dee2e6; margin: 25px 0; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    <h3 style="margin-top:0; border-bottom: 3px solid #3498db; padding-bottom: 12px; color: #2c3e50; display: flex; align-items: center;">
        <span style="margin-right:10px;">💧</span> Steam Properties Estimator
    </h3>
    
    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85em; color: #666; border-left: 4px solid #3498db;">
        • <b>Saturated:</b> P (bar abs) 또는 T (°C) 중 <b>하나만</b> 입력하세요.<br>
        • <b>Super/Sub:</b> P와 T를 <b>모두</b> 입력하여 정확한 상태를 확인하세요.
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
        <div style="display: flex; flex-direction: column;">
            <label style="font-weight:700; font-size: 0.85em; margin-bottom: 8px; color: #444;">Pressure (P, bar abs)</label>
            <input type="number" id="st_p" placeholder="예: 10" style="padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#3498db'" onblur="this.style.borderColor='#e9ecef'">
        </div>
        <div style="display: flex; flex-direction: column;">
            <label style="font-weight:700; font-size: 0.85em; margin-bottom: 8px; color: #444;">Temperature (T, °C)</label>
            <input type="number" id="st_t" placeholder="예: 180" style="padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#3498db'" onblur="this.style.borderColor='#e9ecef'">
        </div>
    </div>

    <button id="btn-calc-steam" style="background: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 800; font-size: 1.05em; transition: all 0.2s; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);" onmouseover="this.style.background='#2980b9'" onmouseout="this.style.background='#3498db'">RUN CALCULATION</button>

    <div id="steam-result" style="margin-top: 30px; display:none;">
        <div style="text-align: center; margin-bottom: 20px; padding: 15px; background: #fffaf0; border: 1px solid #ffeeba; border-radius: 10px;">
            <div id="st-res-state" style="font-weight:800; font-size:1.2em; color:#d35400; margin-bottom:8px;"></div>
            <div id="st-res-params" style="font-size: 0.95em; color: #2c3e50; font-family: monospace;"></div>
        </div>
        
        <div style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.9em; border: 1px solid #dee2e6; border-radius: 8px;">
                <thead id="st-table-head" style="background: #f1f3f5; color: #495057;"></thead>
                <tbody id="st-table-body" style="background: white;"></tbody>
            </table>
        </div>
        
        <div id="st-rk-warning" style="display:none; color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; margin-top: 15px; font-size: 0.85em; border-radius: 6px; text-align: center;">
            ⚠️ <b>Note:</b> Vapor density calculation used ideal-gas fallback.
        </div>
    </div>
</div>

<script>
// [기존 Core Logic 함수들은 동일하므로 생략 - 이전 답변의 script 내용을 그대로 넣어주세요]
// 단, calculateSteam 함수 내의 table 생성 HTML만 아래 스타일로 교체해 주시면 됩니다.

function calculateSteam() {
    // ... [기존 로직 수행] ...

    // 결과 출력 UI 생성 부분 수정
    if (mode === "sat") {
        document.getElementById('st-res-state').innerText = "Phase: Saturated (Liq & Vap)";
        thead = `
            <tr>
                <th style="padding:12px; border-bottom:2px solid #dee2e6; text-align:left;">Property</th>
                <th style="padding:12px; border-bottom:2px solid #dee2e6; color:#007bff;">Liquid</th>
                <th style="padding:12px; border-bottom:2px solid #dee2e6; color:#6f42c1;">Evap.</th>
                <th style="padding:12px; border-bottom:2px solid #dee2e6; color:#fd7e14;">Vapor</th>
            </tr>
        `;
        tbody = `
            <tr style="border-bottom:1px solid #f1f3f5;"><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Enthalpy (kJ/kg)</td><td style="text-align:center;">${fmt(H_L, 1)}</td><td style="text-align:center;color:#6f42c1;">${fmt(H_vap, 1)}</td><td style="text-align:center;">${fmt(H_V_sat, 1)}</td></tr>
            <tr style="border-bottom:1px solid #f1f3f5;"><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Entropy (kJ/kg·K)</td><td style="text-align:center;">${fmt(S_L, 4)}</td><td style="text-align:center;color:#6f42c1;">${fmt(H_vap/T_K, 4)}</td><td style="text-align:center;">${fmt(S_V_sat, 4)}</td></tr>
            <tr style="border-bottom:1px solid #f1f3f5;"><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Density (kg/m³)</td><td style="text-align:center;">${fmt(Rho_L, 1)}</td><td style="text-align:center;">-</td><td style="text-align:center;">${fmt(Rho_V_sat, 3)}</td></tr>
            <tr style="border-bottom:1px solid #f1f3f5;"><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Cp (kJ/kg·K)</td><td style="text-align:center;">${fmt(Cp_L, 3)}</td><td style="text-align:center;">-</td><td style="text-align:center;">${fmt(Cp_V_sat, 3)}</td></tr>
            <tr style="border-bottom:1px solid #f1f3f5;"><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Viscosity (cP)</td><td style="text-align:center;">${fmt(Visc_L_cP, 3)}</td><td style="text-align:center;">-</td><td style="text-align:center;">${fmt(Visc_V_sat_cP, 4)}</td></tr>
            <tr><td style="padding:10px; font-weight:bold; background:#fcfcfc;">Surface Tension</td><td style="text-align:center;">${fmt(Surf, 2)}</td><td style="text-align:center;">-</td><td style="text-align:center;">-</td></tr>
        `;
    }
    // ... [나머지 코드 생략] ...
}
</script>
